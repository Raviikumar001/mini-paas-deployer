<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nobuild</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --paper: #f4f3ec;
        --panel: #fbfaf5;
        --panel-2: #ecebe4;
        --ink: #0c0d0d;
        --ink-soft: #454741;
        --ink-muted: #767870;
        --line: rgba(12,13,13,0.12);
        --line-strong: rgba(12,13,13,0.22);
        --blue: #667cff;
        --blue-soft: rgba(102,124,255,0.11);
        --lime: #d9ff66;
        --amber: #ffb24f;
        --success: #168a5b;
        --warning: #b86a00;
        --danger: #d24343;

        --bg-base: var(--paper);
        --bg-surface: var(--panel);
        --bg-raised: var(--panel-2);
        --bg-hover: #e4e2d8;
        --bg-stripe: rgba(12,13,13,0.035);
        --text-primary: var(--ink);
        --text-secondary: var(--ink-soft);
        --text-muted: var(--ink-muted);
        --border-subtle: var(--line);
        --border-default: var(--line-strong);
        --border-emphasis: rgba(12,13,13,0.34);
        --accent: var(--lime);
        --accent-dim: rgba(217,255,102,0.2);
        --accent-text: var(--ink);

        --font-display: 'Space Grotesk', sans-serif;
        --font-body: 'Space Grotesk', sans-serif;
        --font-mono: 'IBM Plex Mono', monospace;
        --font-code: 'JetBrains Mono', 'IBM Plex Mono', monospace;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body, #root {
        height: 100%;
      }

      body {
        font-family: var(--font-body);
        background:
          radial-gradient(circle at top left, rgba(102,124,255,0.10), transparent 32rem),
          linear-gradient(135deg, rgba(12,13,13,0.035) 0 1px, transparent 1px) 0 0 / 18px 18px,
          var(--paper);
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
        font-size: 14px;
      }

      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--bg-raised); border-radius: 2px; }

      *:focus-visible {
        outline: none;
        box-shadow: 0 0 0 2px var(--blue);
      }

      button, input, textarea {
        font: inherit;
      }

      /* ── Animations ─────────────────────────────────────────────────────── */
      @keyframes fadeSlideIn {
        from { opacity: 0; transform: translateX(-6px); }
        to   { opacity: 1; transform: translateX(0); }
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }

      @keyframes pulse-dot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: 0.5; transform: scale(0.75); }
      }

      .pulse-dot { animation: pulse-dot 1.5s ease-in-out infinite; }

      .nav-item { animation: fadeSlideIn 0.22s ease both; }
      .nav-item:nth-child(1) { animation-delay: 0.02s; }
      .nav-item:nth-child(2) { animation-delay: 0.05s; }
      .nav-item:nth-child(3) { animation-delay: 0.08s; }
      .nav-item:nth-child(4) { animation-delay: 0.11s; }
      .nav-item:nth-child(5) { animation-delay: 0.14s; }
      .nav-item:nth-child(6) { animation-delay: 0.17s; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
